<div class="page">
  <a class="back-link" routerLink="/farms">← Back to Farms</a>

  <div class="page-header">
    <h2>{{ editId ? 'Edit Farm' : 'New Farm' }}</h2>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Farm Name</label>
        <input formControlName="name" placeholder="e.g. Green Acres" />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <small>Farm name is required.</small>
        }
      </div>

      <div class="form-group">
        <label>Location <span class="optional">(optional)</span></label>
        <input formControlName="location" placeholder="e.g. Iowa" />
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Save</button>
        <a class="btn btn-secondary" routerLink="/farms">Cancel</a>
      </div>
    </form>
  </div>
</div>
